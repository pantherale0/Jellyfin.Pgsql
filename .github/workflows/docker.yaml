name: '🐋 Build & Publish Docker Image'

concurrency:
  group: docker-publish
  cancel-in-progress: false

on:
  release:
    types:
      - released
  schedule:
    # Check for new Jellyfin versions daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      jellyfin_version:
        description: 'Jellyfin version (leave empty for latest)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jellyfin.pgsql

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      jellyfin_version: ${{ steps.version.outputs.jellyfin_version }}
      should_build: ${{ steps.version.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Jellyfin version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the manually specified version or fetch the latest
          if [[ -n "${{ github.event.inputs.jellyfin_version }}" ]]; then
            JELLYFIN_VERSION="${{ github.event.inputs.jellyfin_version }}"
            echo "Using manually specified version: $JELLYFIN_VERSION"
          else
            # Fetch latest Jellyfin version from GitHub releases
            JELLYFIN_VERSION=$(gh api repos/jellyfin/jellyfin/releases/latest -q '.tag_name' | sed 's/^v//')
            if [[ -z "$JELLYFIN_VERSION" ]]; then
              echo "Error: Could not fetch latest Jellyfin version"
              exit 1
            fi
            echo "Fetched latest version: $JELLYFIN_VERSION"
          fi

          # Normalize an optional leading 'v'
          JELLYFIN_VERSION="${JELLYFIN_VERSION#v}"

          echo "jellyfin_version=$JELLYFIN_VERSION" >> "$GITHUB_OUTPUT"

          # Check if this Jellyfin-version tag already exists in GHCR
          EXISTING_TAGS=$(gh api /users/${{ github.repository_owner }}/packages/container/${{ env.IMAGE_NAME }}/versions \
            --paginate --jq '.[].metadata.container.tags[]?' 2>/dev/null) || EXISTING_TAGS=""

          if echo "$EXISTING_TAGS" | grep -qx "$JELLYFIN_VERSION"; then
            TAG_EXISTS="true"
          else
            TAG_EXISTS="false"
          fi

          # Build rules:
          # - Always build on manual dispatch and release
          # - On schedule, only build if the version tag does not already exist
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.event_name }}" == "release" ]] || [[ "$TAG_EXISTS" == "false" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Will build image for Jellyfin $JELLYFIN_VERSION"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Image tag $JELLYFIN_VERSION already exists; skipping scheduled build"
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Docker image tag
        id: image-tag
        run: |
          JELLYFIN_VERSION="${{ needs.check-version.outputs.jellyfin_version }}"
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$JELLYFIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "Image tag: $JELLYFIN_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            JELLYFIN_VERSION=${{ steps.image-tag.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-tag.outputs.owner }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.image-tag.outputs.owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64